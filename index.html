<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0b1c3f" />
    <!--
      Aura is dark-only by design: cards are frosted surfaces engineered
      to sit on a colourful weather-scene gradient. Half-light support
      (light body, dark cards) read as a UI bug per the design audit.
      "dark only" tells the UA to skip light-mode form-widget and scrollbar
      adaptations rather than mixing the two.
    -->
    <meta name="color-scheme" content="dark only" />
    <meta name="application-name" content="Aura Weather" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Aura Weather" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Aura - Atmospheric Intelligence</title>
    <meta
      name="description"
      content="Aura is a modern weather dashboard with real-time atmospheric data, adaptive visuals, and a polished bento-grid interface built with React and Vite."
    />

    <meta property="og:title" content="Aura - Atmospheric Intelligence" />
    <meta
      property="og:description"
      content="A polished weather dashboard with real-time atmospheric insights, adaptive gradients, and portfolio-ready UI craftsmanship."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:image:alt" content="Aura weather dashboard preview" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Aura - Atmospheric Intelligence" />
    <meta
      name="twitter:description"
      content="A polished weather dashboard with real-time atmospheric insights and adaptive visuals."
    />
    <meta name="twitter:image" content="/og-image.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://api.open-meteo.com" crossorigin />
    <link rel="preconnect" href="https://geocoding-api.open-meteo.com" crossorigin />
    <link rel="dns-prefetch" href="https://archive-api.open-meteo.com" />
    <link rel="dns-prefetch" href="https://air-quality-api.open-meteo.com" />
    <link rel="dns-prefetch" href="https://api.weather.gov" />
    <link rel="dns-prefetch" href="https://api.bigdatacloud.net" />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800&family=Space+Grotesk:wght@600;700&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800&family=Space+Grotesk:wght@600;700&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800&family=Space+Grotesk:wght@600;700&display=swap"
      />
    </noscript>
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  </head>
  <body>
    <div id="root"></div>
    <noscript>
      <div style="max-width:34rem;margin:18vh auto 0;padding:24px;font-family:system-ui,-apple-system,'Segoe UI',sans-serif;color:#e8eefc;text-align:center;line-height:1.5;">
        <h1 style="font-size:1.4rem;margin:0 0 8px;">Aura Weather needs JavaScript</h1>
        <p style="margin:0;color:#aebbd8;">This dashboard renders live forecast, air-quality, and severe-weather data in the browser. Please enable JavaScript to continue.</p>
      </div>
    </noscript>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
