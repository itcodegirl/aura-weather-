name: Quality Gates

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  code-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Component render tests
        run: npm run test:components

      - name: Production build
        run: npm run build

      - name: Upload production build
        uses: actions/upload-artifact@v4
        with:
          name: aura-weather-dist
          path: dist/
          if-no-files-found: error
          retention-days: 7

  browser-quality:
    runs-on: ubuntu-latest
    needs: code-quality

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser and system dependencies
        run: npx playwright install --with-deps chromium

      - name: Install fonts for visual baselines
        run: sudo apt-get install -y fonts-liberation

      - name: Playwright E2E, accessibility, and visual checks
        run: npm run test:e2e -- --workers=1

      - name: Upload trust-contract screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trust-contract-screenshots
          path: docs/screenshots/*.png
          if-no-files-found: ignore
          retention-days: 30

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload Playwright test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results/
          retention-days: 14

  lighthouse-budget:
    runs-on: ubuntu-latest
    needs: code-quality

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lighthouse budgets
        run: npm run test:lighthouse

      - name: Upload Lighthouse artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-artifacts
          path: .lighthouseci/
          if-no-files-found: ignore
          retention-days: 14
