name: Quality Gates

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  code-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Component render tests
        run: npm run test:components

      - name: Production build
        run: npm run build

      - name: Upload production build
        uses: actions/upload-artifact@v4
        with:
          name: aura-weather-dist
          path: dist/
          if-no-files-found: error
          retention-days: 7

  browser-quality:
    runs-on: ubuntu-latest
    needs: code-quality

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser and system dependencies
        run: npx playwright install --with-deps chromium

      - name: Install fonts for visual baselines
        run: sudo apt-get install -y fonts-liberation

      - name: Playwright E2E, accessibility, and visual checks
        run: npm run test:e2e -- --workers=1

      - name: Upload trust-contract screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trust-contract-screenshots
          path: docs/screenshots/*.png
          if-no-files-found: ignore
          retention-days: 30

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload Playwright test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results/
          retention-days: 14

  lighthouse-budget:
    runs-on: ubuntu-latest
    needs: code-quality

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser and system dependencies
        run: npx playwright install --with-deps chromium

      - name: Lighthouse budgets
        run: npm run test:lighthouse

      - name: Upload Lighthouse artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-artifacts
          path: .lighthouseci/
          if-no-files-found: ignore
          retention-days: 14

  refresh-visual-baselines:
    # Manual only: trigger from the Actions tab ("Run workflow") after a
    # UI change has intentionally moved the rendered output and the
    # committed Playwright screenshots need re-recording. It re-records
    # the baselines in the same CI environment that `browser-quality`
    # compares against (Chromium + fonts-liberation), then opens a PR
    # with the diff for review — so refreshing baselines never depends
    # on a contributor having a matching local browser/font setup.
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser and system dependencies
        run: npx playwright install --with-deps chromium

      - name: Install fonts for visual baselines
        run: sudo apt-get install -y fonts-liberation

      - name: Re-record visual baselines
        run: npm run test:visual:update

      - name: Open a PR if the baselines changed
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if git diff --quiet -- e2e; then
            echo "Visual baselines are already up to date — nothing to do."
            exit 0
          fi
          BRANCH="ci/refresh-visual-baselines-${GITHUB_RUN_ID}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add e2e/visual-regression.spec.js-snapshots
          git commit -m "chore(visual): re-record Playwright baselines"
          git push origin "$BRANCH"
          gh pr create \
            --base "${GITHUB_REF_NAME}" \
            --head "$BRANCH" \
            --title "chore(visual): re-record Playwright baselines" \
            --body "Regenerated by the \`refresh-visual-baselines\` workflow_dispatch job in the \`browser-quality\` CI environment. Review the screenshot diffs in this PR — they should be the intended rendering — then merge to bring \`browser-quality\` green."

