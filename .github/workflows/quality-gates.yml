name: Quality Gates

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  code-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Component render tests
        run: npm run test:components

      - name: Production build
        run: npm run build

      - name: Upload production build
        uses: actions/upload-artifact@v4
        with:
          name: aura-weather-dist
          path: dist/
          if-no-files-found: error
          retention-days: 7

  browser-quality:
    runs-on: ubuntu-latest
    needs: code-quality

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser and system dependencies
        run: npx playwright install --with-deps chromium

      - name: Install fonts for visual baselines
        run: sudo apt-get install -y fonts-liberation

      - name: Playwright E2E, accessibility, and visual checks
        run: npm run test:e2e -- --workers=1

      - name: Upload trust-contract screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trust-contract-screenshots
          path: docs/screenshots/*.png
          if-no-files-found: ignore
          retention-days: 30

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload Playwright test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results/
          retention-days: 14

  lighthouse-budget:
    runs-on: ubuntu-latest
    needs: code-quality

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser and system dependencies
        run: npx playwright install --with-deps chromium

      - name: Lighthouse budgets
        run: npm run test:lighthouse

      - name: Upload Lighthouse artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-artifacts
          path: .lighthouseci/
          if-no-files-found: ignore
          retention-days: 14

  refresh-visual-baselines:
    # Manual only: trigger from the Actions tab ("Run workflow") after a
    # UI change has intentionally moved the rendered output and the
    # committed Playwright screenshots need re-recording. It re-records
    # the baselines in the same environment `browser-quality` runs in
    # (Chromium + fonts-liberation) and uploads them as the
    # `visual-baselines` artifact. Download it, copy the PNGs over
    # `e2e/visual-regression.spec.js-snapshots/`, and commit on a branch
    # / PR. Committing by hand keeps a human reviewing the new
    # screenshots — and means this job needs no write permissions and
    # no "Actions may create PRs" repo setting.
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser and system dependencies
        run: npx playwright install --with-deps chromium

      - name: Install fonts for visual baselines
        run: sudo apt-get install -y fonts-liberation

      - name: Re-record visual baselines
        run: npm run test:visual:update

      - name: Summarise what changed
        if: always()
        run: |
          {
            echo "### Visual baselines re-recorded"
            echo ""
            echo "Download the **\`visual-baselines\`** artifact below, copy its contents over \`e2e/visual-regression.spec.js-snapshots/\`, and commit (review the screenshots first). \`browser-quality\` goes green once those land on the target branch."
            echo ""
            echo "Snapshot files touched by this run:"
            echo '```'
            git status --porcelain -- e2e/visual-regression.spec.js-snapshots || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload regenerated baselines
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-baselines
          path: e2e/visual-regression.spec.js-snapshots/
          if-no-files-found: error
          retention-days: 14

