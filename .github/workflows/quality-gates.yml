name: Quality Gates

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint-and-unit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Component render tests
        run: npm run test:components

  browser-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install chromium

      - name: E2E smoke tests
        run: npm run test:e2e

      - name: Upload trust-contract screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trust-contract-screenshots
          path: docs/screenshots/*.png
          if-no-files-found: ignore
          retention-days: 30

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Lighthouse budgets
        run: npm run test:lighthouse
